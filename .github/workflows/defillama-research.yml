name: DeFiLlama Research Discord notifier

on:
  schedule:
    # 10:00 JST daily
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      force_latest:
        description: "Send latest N articles even if already seen"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
          - "2"
          - "3"
          - "5"

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Validate configuration
        run: |
          missing=0
          echo "force_latest=${FORCE_LATEST:-0}"

          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::Missing repository secret DISCORD_WEBHOOK_URL"
            missing=1
          else
            echo "DISCORD_WEBHOOK_URL is set"
          fi

          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not set. The notification will use a non-AI fallback summary."
          else
            echo "OPENAI_API_KEY is set"
          fi

          exit "$missing"
        env:
          FORCE_LATEST: ${{ github.event.inputs.force_latest || '0' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Send Discord notification
        run: |
          if [ "${FORCE_LATEST:-0}" != "0" ]; then
            npm run notify -- --force-latest "$FORCE_LATEST"
          else
            npm run notify
          fi
        env:
          FORCE_LATEST: ${{ github.event.inputs.force_latest || '0' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          REQUIRE_OPENAI: "false"
          SEED_ON_FIRST_RUN: "true"

      - name: Commit notifier state
        run: |
          if ! git diff --quiet -- .data/seen.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .data/seen.json
            git commit -m "Update seen research articles"
            git push
          fi
